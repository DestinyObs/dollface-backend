name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dollface
          POSTGRES_PASSWORD: dollface
          POSTGRES_DB: dollface
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U dollface"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://dollface:dollface@localhost:5434/dollface?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-value
      JWT_REFRESH_SECRET: ci-refresh-secret-value
      ADMIN_EMAILS: admin@dollface.app

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npx prisma migrate deploy
      - run: npm run seed
      - run: npm run build
      - run: npm test
