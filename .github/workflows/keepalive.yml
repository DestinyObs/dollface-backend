name: Keep Render awake

# Render free web services sleep after ~15 min idle. GitHub cron can't fire every
# 2 min, so each run self-loops: it pings the API + web every 2 minutes for ~12
# minutes, and is scheduled every 10 minutes so runs overlap with no gap.
# (Public repo → free, unlimited Actions minutes.)
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

concurrency:
  group: keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Ping every 2 minutes
        run: |
          API=https://dollface-api.onrender.com/health
          WEB=https://dollface-web.onrender.com/
          for i in $(seq 1 6); do
            a=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "$API" || echo 000)
            w=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "$WEB" || echo 000)
            echo "$(date -u +%H:%M:%S) ping $i/6 → api:$a web:$w"
            if [ "$i" -lt 6 ]; then sleep 120; fi
          done
