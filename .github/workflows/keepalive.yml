name: Keep Render awake

# Render free web services sleep after ~15 min idle. This pings /health on a
# schedule so the API stays warm for testers. (GitHub cron is best-effort and
# may be delayed a few minutes under load — the interval has margin for that.)
on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://dollface-api.onrender.com/health || echo 000)
            echo "attempt $i → HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 20
          done
          echo "health check did not return 200 (service may be cold-starting)"
