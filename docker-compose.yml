services:
  postgres:
    image: postgres:16-alpine
    container_name: dollface-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dollface
      POSTGRES_PASSWORD: dollface
      POSTGRES_DB: dollface
    ports:
      - "5434:5432"
    volumes:
      - dollface_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dollface -d dollface"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dollface_pgdata:
