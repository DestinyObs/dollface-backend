# Render blueprint — one-click deploy of the API + managed Postgres.
# Create a Render account, "New → Blueprint", point it at this repo.
# Then set PUBLIC_URL (the service URL) and CORS_ORIGINS in the dashboard.
services:
  - type: web
    name: dollface-api
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npx prisma migrate deploy && npm run seed && npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: dollface-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PUBLIC_URL
        sync: false # set to the deployed service URL
      - key: CORS_ORIGINS
        sync: false # set to your web + app origins
      - key: ADMIN_EMAILS
        sync: false

databases:
  - name: dollface-db
    plan: starter
    databaseName: dollface
    user: dollface
