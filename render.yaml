# Render blueprint — free-tier deploy of the API + managed Postgres.
# NOTE: the live service was created via the Render API/CLI; this file documents
# the equivalent infra. Build installs dev deps (NODE_ENV=production otherwise
# skips the @types/* and tsx needed to build + seed).
services:
  - type: web
    name: dollface-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --include=dev && npm run build
    startCommand: npx prisma migrate deploy && npm run seed && npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: dollface-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PUBLIC_URL
        value: https://dollface-api.onrender.com
      - key: CORS_ORIGINS
        value: "*"
      - key: ADMIN_EMAILS
        sync: false
      # Real verification emails via Resend (verified domain). With this set,
      # the OTP code is emailed (not returned in the API response). To fall back
      # to showing the code in-app for testers, set EXPOSE_OTP=1 and unset these.
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: DollFace <noreply@resuplyai.com>

databases:
  - name: dollface-db
    plan: free
    region: oregon
    databaseName: dollface
    user: dollface
